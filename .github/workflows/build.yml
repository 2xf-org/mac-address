name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ($expected)." >&2
            exit 1
          fi

      - name: Test models
        run: ./test.sh

      - name: Build app
        run: ./build.sh

      - name: Package app
        run: |
          ditto -c -k --keepParent "MAC Address.app" "MAC Address-${{ steps.version.outputs.version }}.zip"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: MAC Address
          path: MAC Address-${{ steps.version.outputs.version }}.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "$GITHUB_REF_NAME" \
            "MAC Address-${version}.zip" \
            --title "MAC Address ${version}" \
            --notes "MAC Address ${version}"
